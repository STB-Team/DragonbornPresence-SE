name: Сборка GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Сборка и публикация архива
    runs-on: windows-2025-vs2026

    steps:
      - name: Получение исходного кода
        uses: actions/checkout@v5

      - name: Проверка соответствия тега версии проекта
        shell: pwsh
        run: ./scripts/Test-ReleaseVersion.ps1 -Tag "${{ github.ref_name }}"

      - name: Настройка тестовой сборки
        run: cmake --preset vs2026-tests

      - name: Сборка тестов
        run: cmake --build --preset tests

      - name: Запуск тестов
        run: ctest --preset tests

      - name: Настройка Visual Studio 2026
        run: cmake --preset vs2026

      - name: Сборка Release-архива
        run: cmake --build --preset release

      - name: Проверка Release-архива
        shell: pwsh
        run: ./scripts/Validate-ReleaseArchive.ps1 -ArchivePath "build/vs2026/DragonbornPresence.zip"

      - name: Публикация GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          "build/vs2026/DragonbornPresence.zip#DragonbornPresence.zip"
          --verify-tag
          --generate-notes
          --title "DragonbornPresence ${{ github.ref_name }}"
