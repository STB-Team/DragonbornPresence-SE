name: Сборка GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Сборка и публикация архива
    runs-on: windows-2025-vs2026

    steps:
      - name: Получение исходного кода
        uses: actions/checkout@v4

      - name: Настройка Visual Studio 2026
        run: cmake --preset vs2026

      - name: Сборка Release-архива
        run: cmake --build --preset release

      - name: Проверка Release-архива
        shell: pwsh
        run: |
          if (-not (Test-Path "build/vs2026/DragonbornPresence.zip")) {
            throw "Release-архив не создан."
          }

      - name: Публикация GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          "build/vs2026/DragonbornPresence.zip#DragonbornPresence.zip"
          --verify-tag
          --generate-notes
          --title "DragonbornPresence ${{ github.ref_name }}"
